<div class="register-card">
    <h1>Register</h1>
    <p>Welcome to Mirip-Tokped</p>

    <form class="form-card" action="/api/user" method="POST">
        <div class="form-group">
            <label>Nama</label>
            <input type="text" id="name" name="name" required placeholder="Masukkan Nama">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" name="email" required placeholder="Masukkan email">
        </div>
        <div class="form-group">
            <label>Alamat</label>
            <input type="text" id="address" name="address" required placeholder="Masukkan Alamat">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" name="password" required placeholder="Masukkan kata password">
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" required
                placeholder="Konfirmasi password">
        </div>

        <input type="hidden" name="role" value="BUYER">
        <input type="hidden" name="balance" value="0">

        <button type="submit" id="regBuyerBtn">Daftar</button>
    </form>

    <div class="register-link">
        Sudah punya akun? <a href="/login">Masuk Sekarang!</a>
    </div>
</div>
