<main class="content-wrapper">

    <!-- HEADER TOKO -->
    <section class="profile-header">
        <div class="profile-avatar" id="profile-avatar">

        </div>
        <div class="profile-info">
            <h2 class="store-name" id="store-name">Nama Toko</h2>
        </div>
        <button class="edit-button" id="editBtn">Edit</button>
    </section>

    <!-- DESKRIPSI TOKO (CARD TERPISAH) -->
    <section class="store-description-card">
        <h3 class="desc-title">Deskripsi Toko</h3>
        <p class="store-description" id="store-description">
            Deskripsi toko akan ditampilkan di sini. Jika teks panjang, bagian ini bisa di-scroll untuk melihat semua
            isi.
        </p>
    </section>

    <div id="edit-store-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="close-button" id="close-edit-modal">&times;</span>
            <h2>Edit Toko</h2>
            
            <form id="edit-store-form">
                <div class="form-group">
                    <label for="edit-store-name">Nama Toko:</label>
                    <input type="text" id="edit-store-name" required>
                </div>
                
                <div class="form-group">
                    <label for="edit-store-desc">Deskripsi Toko:</label>
                    <textarea id="edit-store-desc" rows="4"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="edit-store-image">Gambar Toko Baru:</label>
                    <input type="file" id="edit-store-image" accept="image/*">
                </div>
                
                <div class="modal-actions">
                    <button type="button" id="cancel-edit-btn" class="btn btn-no">Batal</button>
                    <button type="submit" class="btn btn-yes">Simpan Perubahan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- STATISTIK -->
    <section class="store-stats">
        <div class="stats-grid">

            <div class="stat-card">
                <p class="stat-label">Total Produk Unik</p>
                <p class="stat-value" id="total-product">xxx</p>
            </div>

            <div class="stat-card">
                <p class="stat-label">Pending Orders</p>
                <p class="stat-value" id="pending-order">xxx</p>
            </div>

            <div class="stat-card">
                <p class="stat-label">Produk Stok Menipis</p>
                <p class="stat-value" id="low-stock">xxx</p>
            </div>

            <div class="stat-card">
                <p class="stat-label">Total Pendapatan</p>
                <p class="stat-value" id="total-revenue">Rp. xxxx</p>
            </div>

        </div>
    </section>

    <!-- AKSI CEPAT -->
    <section class="quick-actions">
        <div class="action-card">
            <a href="#">
                <div class="action-icon">
                    <img src="img/seller/basket.png" alt="Kelola Produk">
                </div>
                <div class="action-content">
                    <h3 class="action-title">Kelola Produk</h3>
                    <button class="action-button" id="kelolaBtn">Klik di sini</button>
                </div>
            </a>
        </div>

        <div class="action-card">
            <a href="#">
                <div class="action-icon">
                    <img src="img/seller/order.png" alt="Lihat Order">
                </div>
                <div class="action-content">
                    <h3 class="action-title">Lihat Order</h3>
                    <button class="action-button" id="orderBtn">Klik di sini</button>
                </div>
            </a>
        </div>

        <div class="action-card">
            <a href="#">
                <div class="action-icon">
                    <img src="img/seller/add.png" alt="Tambah Produk Baru">
                </div>
                <div class="action-content">
                    <h3 class="action-title">Tambah Produk Baru</h3>
                    <button class="action-button" id="addProdBtn">Klik di sini</button>
                </div>
            </a>
        </div>
    </section>

</main>
