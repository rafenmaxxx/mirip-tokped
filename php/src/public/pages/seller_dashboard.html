<main class="content-wrapper">
    
    <section class="profile-header">
        <div class="profile-avatar">
            <img src="img/seller/profile.png" alt="Gambar Profil Toko">
        </div>
        <div class="profile-info">
            <h2 class="store-name">nama toko</h2>
            <p class="store-description">deskripsi toko</p>
        </div>
        <button class="edit-button">edit</button>
    </section>

    <section class="store-stats">
        <div class="stats-grid">
            
            <div class="stat-card">
                <p class="stat-label">total produk unik</p>
                <p class="stat-value">24</p>
            </div>

            <div class="stat-card">
                <p class="stat-label">pending orders</p>
                <p class="stat-value">10</p>
            </div>

            <div class="stat-card">
                <p class="stat-label">produk stok menipis</p>
                <p class="stat-value">5</p>
            </div>

            <div class="stat-card">
                <p class="stat-label">total pendapatan</p>
                <p class="stat-value">Rp. 12.500.000</p>
            </div>

        </div>
    </section>

    <section class="quick-actions">
        <div class="action-card">
            <a href="#">
                <div class="action-icon">
                    <img src="img/seller/basket.png" alt="Kelola Produk">
                </div>
                
                <div class="action-content">
                    <h3 class="action-title">kelola produk</h3>
                    <button class="action-button">klik di sini</button>
                </div>
            </a>
        </div>

        <div class="action-card">
            <a href="#">
                <div class="action-icon">
                    <img src="img/seller/order.png" alt="Lihat Order">
                </div>
                <div class="action-content">
                    <h3 class="action-title">lihat order</h3>
                    <button class="action-button">klik di sini</button>
                </div>
            </a>
        </div>

        <div class="action-card">
            <a href="#">
                <div class="action-icon">
                    <img src="img/seller/add.png" alt="Tambah Produk Baru">
                </div>
                <div class="action-content">
                    <h3 class="action-title">tambah produk baru</h3>
                    <button class="action-button">klik di sini</button>
                </div>
            </a>
        </div>
    </section>

</main>
