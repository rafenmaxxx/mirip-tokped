<div class="register-card">
    <h1>Register Seller</h1>
    <p>Welcome to Mirip-Tokped</p>

    <form action="/api/user" method="POST" enctype="multipart/form-data" class="form-card">
        <div class="form-group">
            <label for="name">Nama</label>
            <input type="text" id="name" name="name" required placeholder="Masukkan Nama">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Masukkan email">
        </div>
        <div class="form-group password-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Masukkan password">
            <button type="button" class="toggle-password" data-target="password">show</button>
        </div>
        <div class="form-group password-field">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" required
                placeholder="Konfirmasi password">
            <button type="button" class="toggle-password" data-target="confirm-password">show</button>
        </div>
        <div class="form-group">
            <label for="store-name">Nama Toko</label>
            <input type="text" id="store-name" name="store-name" required placeholder="Masukkan Nama Toko">
        </div>
        <div class="form-group">
            <label for="store-desc">Deskripsi Toko</label>
            <div id="quill-desc" style="height: 150px;"></div>
            <input type="hidden" name="store-desc" id="quill-desc-input">
        </div>
        <div class="form-group">
            <label for="store-logo">Logo Toko</label>
            <input type="file" id="store-logo" name="store-logo" required>
        </div>

        <input type="hidden" name="role" value="SELLER">
        <input type="hidden" name="balance" value="0">

        <button type="submit" id="regSellerBtn">Daftar</button>
        <div class="register-link">
            Sudah punya akun? <a href="/login">Masuk Sekarang!</a>
        </div>
    </form>
</div>
