<div class="register-choice">
    <h1>Pilih Jenis Akun</h1>
    <p>Daftar sebagai Buyer atau Seller di Mirip-Tokped</p>

    <form id="registerForm">
        <div class="choice-container">
            <div class="register-card selectable" data-type="buyer">
                <img src="/img/register-choice-buyer.png">
                <h2>Daftar sebagai Buyer</h2>
                <p>Belanja produk terbaik dari seller terpercaya.</p>
            </div>

            <div class="register-card selectable" data-type="seller">
                <img src="/img/register-choice-seller.png">
                <h2>Daftar sebagai Seller</h2>
                <p>Jual produkmu dan jangkau lebih banyak pembeli.</p>

            </div>
        </div>

        <button type="submit" class="submit-btn">Lanjutkan</button>
    </form>
</div>
