<div class="product-detail-container">
    <div class="product-left">
        <div class="product-image" id="p-img">
        </div>
        <div class="product-stock" id="p-stock">
        </div>
        <div id="add-cart"></div>
    </div>

    <div class="product-center">
        <h1 class="product-name" id="p-name"></h1>
        <p class="product-price" id="p-price"></p>
        <p class="product-category" id="p-category"></p>

        <div class="product-description">
            <h3>Deskripsi Produk</h3>
            <p id="p-desc">

            </p>
        </div>
    </div>

    <div class="product-right">
        <div class="seller-card">
            <div class="self-avatar" id="s-img">
            </div>

            <h3 class="seller-name" id="s-name"></h3>
            <p class="seller-location" id="s-desc"></p>

            <button class="visit-store-btn" id="v-store">Kunjungi Toko</button>
        </div>
    </div>
</div>
