<div class="form-container">
    <form class="product-form">

        <div class="form-image-column">
            <div class="form-image-upload">
                <div class="plus-icon">+</div>
                <p>add photo</p>
            </div>

            <button type="button" class="btn-ganti-foto">ganti foto</button>
        </div>

        <div class="form-fields">

            <div class="form-group">
                <label for="nama-produk">nama produk</label>
                <input type="text" id="nama-produk">
            </div>

            <div class="form-group">
                <label for="store-desc">Deskripsi Product</label>
                <div id="quill-desc"></div>
                <input type="hidden" name="store-desc" id="quill-desc-input">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="harga">harga</label>
                    <input type="text" id="harga">
                </div>
                <div class="form-group">
                    <label for="stok">stok</label>
                    <input type="text" id="stok">
                </div>
            </div>

            <div class="form-group">
                <label>Kategori</label>
                <div class="filter-checkboxes">
                    <label><input type="checkbox" value="Elektronik"> Elektronik</label>
                    <label><input type="checkbox" value="Fashion"> Fashion</label>
                    <label><input type="checkbox" value="Buku & Alat Tulis"> Buku & Alat Tulis</label>
                    <label><input type="checkbox" value="Olahraga"> Olahraga</label>
                    <label><input type="checkbox" value="Rumah Tangga"> Rumah Tangga</label>
                </div>
            </div>
        </div>

    </form>
    <div class="action-buttons-right">
        <button type="button" class="btn-cancel" id="batalBtn">batal</button>
        <button type="submit" class="btn-save">simpan</button>
    </div>
</div>
