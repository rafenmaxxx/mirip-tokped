<div class="main-container">
    <header class="page-header">
        <div class="order-filter">
            <div class="search-bar">
                <input type="text" placeholder="search products">
                <button class="search-btn">
                    <img src="/img/seller/search.png" alt="Search Icon">
                </button>
            </div>
            <div class="custom-select">
                <select name="category" class="filter-select" id="category-filter">
                </select>
                <div class="select-arrow">▼</div>
            </div>
            <div class="custom-select">
                <select name="sort" class="filter-select" id="sort-filter">
                    <option value="">Not Sorted</option>
                    <option value="nama-asc">nama (A-Z)</option>
                    <option value="nama-desc">nama (Z-A)</option>
                    <option value="harga-asc">harga (min-max)</option>
                    <option value="harga-desc">harga (max-min)</option>
                    <option value="stok-asc">stok (min-max)</option>
                    <option value="stok-desc">stok (max-min)</option>
                </select>
                <div class="select-arrow">▼</div>
            </div>
        </div>
        <a class="btn-add" href="/seller/products/add">tambah +</a>
    </header>
    <main class="product-grid" id="pg1"></main>

    <footer class="pagination-footer">
        <span class="pagination-info"></span>
        <nav class="pagination-nav" id="pagination-nav-buttons"></nav>
        <select name="items-per-page" class="items-per-page" id="items-per-page-select">
            <option value="1">1</option>
            <option value="4">4</option>
            <option value="6">6</option>
        </select>
    </footer>
</div>
