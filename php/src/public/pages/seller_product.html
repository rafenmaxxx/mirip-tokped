<div class="main-container">
    <header class="page-header">
        <div class="order-filter">
            <div class="search-bar">
                <input type="text" placeholder="search products" id="search-input">
                <button class="search-btn">
                </button>
            </div>
            <div class="custom-select">
                <select name="category" class="filter-select" id="category-filter">
                </select>
                <div class="select-arrow">▼</div>
            </div>
            <div class="custom-select">
                <select name="sort" class="filter-select" id="sort-filter">
                    <option value="0">Not Sorted</option>
                    <option value="1">nama (A-Z)</option>
                    <option value="2">nama (Z-A)</option>
                    <option value="3">harga (min-max)</option>
                    <option value="4">harga (max-min)</option>
                    <option value="5">stok (min-max)</option>
                    <option value="6">stok (max-min)</option>
                </select>
                <div class="select-arrow">▼</div>
            </div>
        </div>
        <a class="btn-add" href="/seller/products/add">tambah +</a>
    </header>
    <main class="product-grid" id="pg1"></main>

    <footer class="pagination-footer" id="pagination-container">
        <span class="pagination-info"></span>
        <nav class="pagination-nav" id="pagination-nav-buttons"></nav>
        <select name="items-per-page" class="items-per-page" id="items-per-page-select">
            <option value="2">2</option>
            <option value="4">4</option>
            <option value="6">6</option>
        </select>
    </footer>
</div>
